name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: "1.23" }

      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libwayland-dev libxkbcommon-dev

      - run: go build -ldflags="-s -w" -o portview .
        env: { CGO_ENABLED: 1, GOARCH: amd64 }

      - uses: actions/upload-artifact@v4
        with:
          name: portview-linux-x64
          path: portview

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: "1.23" }

      - run: go build -ldflags="-s -w" -o portview .
        env: { CGO_ENABLED: 1, GOOS: darwin, GOARCH: arm64 }

      - uses: actions/upload-artifact@v4
        with:
          name: portview-macos-arm64
          path: portview

  windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: "1.23" }

      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - run: go build -ldflags="-s -w -H windowsgui" -o portview.exe .
        env:
          CGO_ENABLED: 1
          GOOS: windows
          GOARCH: amd64
          CC: x86_64-w64-mingw32-gcc

      - uses: actions/upload-artifact@v4
        with:
          name: portview-windows-x64
          path: portview.exe
