name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: "1.23" }

      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libwayland-dev libxkbcommon-dev

      - run: go install fyne.io/tools/cmd/fyne@latest

      - run: fyne package --os linux --release
        env:
          CGO_ENABLED: 1

      - uses: actions/upload-artifact@v4
        with:
          name: portview-linux
          path: portview.tar.xz

  windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: "1.23" }

      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - run: go install fyne.io/tools/cmd/fyne@latest

      - run: fyne package --os windows --release
        env:
          CGO_ENABLED: 1
          CC: x86_64-w64-mingw32-gcc

      - uses: actions/upload-artifact@v4
        with:
          name: portview-windows
          path: portview.exe

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: "1.23" }

      - run: go install fyne.io/tools/cmd/fyne@latest

      - run: fyne package --os darwin --release
        env:
          CGO_ENABLED: 1

      - uses: actions/upload-artifact@v4
        with:
          name: portview-macos
          path: portview.app
